<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aether Playground</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body, #root {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #1e1e1e;
      color: #d4d4d4;
    }

    .playground {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      display: flex;
      align-items: center;
      padding: 0.75rem 1rem;
      background: #252526;
      border-bottom: 1px solid #3e3e42;
      gap: 1rem;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 600;
      color: #667eea;
      letter-spacing: -0.5px;
    }

    .logo span {
      color: #764ba2;
    }

    .toolbar {
      display: flex;
      gap: 0.5rem;
      margin-left: auto;
    }

    .run-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .run-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .panels {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .left-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      border-right: 1px solid #3e3e42;
    }

    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .panel-header {
      padding: 0.5rem 1rem;
      background: #2d2d2d;
      border-bottom: 1px solid #3e3e42;
      font-size: 0.75rem;
      font-weight: 500;
      color: #858585;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .panel-content {
      flex: 1;
      overflow: auto;
    }

    .preview-container {
      flex: 1;
      background: white;
      overflow: auto;
    }

    .preview-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #666;
      font-size: 0.875rem;
      background: #f5f5f5;
    }

    .output-container {
      height: 200px;
      border-top: 1px solid #3e3e42;
      overflow: auto;
      background: #1e1e1e;
    }

    .status {
      padding: 0.25rem 0.5rem;
      font-size: 0.75rem;
      border-radius: 4px;
      background: #3e3e42;
      color: #858585;
    }

    .status.error {
      background: #dc3545;
      color: white;
    }

    .status.success {
      background: #28a745;
      color: white;
    }

    .status.compiling {
      background: #ffc107;
      color: black;
    }

    #editor {
      height: 100%;
      width: 100%;
    }

    .output-code {
      padding: 1rem;
      font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 0.8125rem;
      line-height: 1.6;
      color: #d4d4d4;
      white-space: pre-wrap;
      word-break: break-all;
      margin: 0;
    }

    .output-error {
      color: #f48771;
      padding: 1rem;
      font-family: 'Fira Code', monospace;
      font-size: 0.8125rem;
      white-space: pre-wrap;
    }

    .output-placeholder {
      color: #666;
      padding: 1rem;
      font-style: italic;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="playground">
      <div class="header">
        <div class="logo">Aether <span>Playground</span></div>
        <div class="toolbar">
          <span id="status" class="status">ready</span>
          <button id="run-btn" class="run-btn">Run</button>
        </div>
      </div>

      <div class="panels">
        <div class="left-panel">
          <div class="panel-header">Editor</div>
          <div class="panel-content">
            <div id="editor"></div>
          </div>
        </div>

        <div class="right-panel">
          <div class="panel-header">Preview</div>
          <div class="preview-container">
            <iframe
              id="preview-iframe"
              class="preview-frame"
              sandbox="allow-scripts allow-modals"
              title="Preview"
              style="width: 100%; height: 100%; border: none; background: white;"
            ></iframe>
          </div>
          <div class="output-container">
            <div class="panel-header">Output (Compiled JS)</div>
            <div id="output"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
