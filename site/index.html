<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Aether - Compile-time Reactive Framework" />
  <title>Aether - Compile-time Reactive Framework</title>
  <link rel="icon" href="/aether/favicon.ico" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    /* ===== Dark Theme ===== */
    [data-theme="dark"] {
      --c-bg: #0a0a0a;
      --c-bg-surface: #141414;
      --c-bg-card: #1a1a1a;
      --c-bg-hover: #222;
      --c-border: #2a2a2a;
      --c-border-light: #333;
      --c-text: #e5e5e5;
      --c-text-muted: #999;
      --c-text-dim: #666;
      --c-accent: #c45d35;
      --c-accent-hover: #d4714d;
      --c-accent-dim: rgba(196, 93, 53, 0.12);
      --c-code-bg: #111;
      --c-code-text: #c9d1d9;
      --c-nav-bg: rgba(10, 10, 10, 0.88);
      --c-active-bg: rgba(255, 255, 255, 0.05);
      --c-selection: rgba(196, 93, 53, 0.3);
      --c-scrollbar: #333;
      --c-strong: #e5e5e5;
    }

    /* ===== Light Theme ===== */
    [data-theme="light"] {
      --c-bg: #ffffff;
      --c-bg-surface: #f7f7f8;
      --c-bg-card: #f0f0f2;
      --c-bg-hover: #eee;
      --c-border: #e2e2e5;
      --c-border-light: #d5d5d8;
      --c-text: #1a1a1a;
      --c-text-muted: #555;
      --c-text-dim: #888;
      --c-accent: #c45d35;
      --c-accent-hover: #b04e2a;
      --c-accent-dim: rgba(196, 93, 53, 0.08);
      --c-code-bg: #f5f5f7;
      --c-code-text: #24292e;
      --c-nav-bg: rgba(255, 255, 255, 0.88);
      --c-active-bg: rgba(0, 0, 0, 0.04);
      --c-selection: rgba(196, 93, 53, 0.15);
      --c-scrollbar: #ccc;
      --c-strong: #1a1a1a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: var(--c-bg);
      color: var(--c-text);
      line-height: 1.6;
      transition: background 0.2s, color 0.2s;
    }
    #app { min-height: 100vh; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--c-scrollbar); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { opacity: 0.8; }
    ::selection { background: var(--c-selection); }
    a { color: inherit; }
    button { font-family: inherit; }
    strong { color: var(--c-strong); font-weight: 600; }
  </style>
  <script>
    // Prevent flash: apply saved theme before render
    (function() {
      var t = localStorage.getItem('aether-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
